services:
  api:
    build:
      context: .
      dockerfile: dockerfile
    container_name: mini_mundo_api
    ports:
      - "8000:80"
    environment:
      - APP_URL=http://localhost:8000
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=ominimundo
      - DB_USERNAME=root
      - DB_PASSWORD=root
      - JWT_SECRET=cocazmsuaUb0LtT1Xv0WLcQSlW4OOkMKFw6OZeoZjSs=
      - JWT_EXPIRATION=60
    volumes:
      - ./:/app
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: mini_mundo_db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=ominimundo
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: